    <!-- JSON-LD WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "KORVEX Pool",
      "url": "https://korvexpool.com",
      "description": "Open-source Ergo cryptocurrency mining pool with PPLNS and Solo modes",
      "inLanguage": "en"
    }
    </script>

    <!-- JSON-LD SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "KORVEX - Ergo Mining Pool",
      "url": "https://korvexpool.com",
      "description": "Open-source Ergo mining pool software supporting PPLNS and Solo mining modes with real-time statistics, vardiff, and automatic payouts.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "KORVEX",
        "url": "https://korvexpool.com"
      }
    }
    </script>

    <!-- JSON-LD FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What are the fees on KORVEX pool?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "KORVEX charges 1% fee for PPLNS mining (port 3416) and 1.5% fee for Solo mining (port 3417). Minimum payout is 1 ERG with 720 block confirmations."
          }
        },
        {
          "@type": "Question",
          "name": "How to start mining Ergo on KORVEX?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Connect your miner to stratum+tcp://korvexpool.com:3416 for PPLNS or port 3417 for Solo. Use your Ergo wallet address as username. Supports lolMiner, TeamRedMiner, Nanominer and other Autolykos2 compatible miners."
          }
        },
        {
          "@type": "Question",
          "name": "Is KORVEX pool open-source?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, KORVEX is fully open-source under the MIT license. The source code is available on GitHub at github.com/iG-VirtuoZz/Korvex."
          }
        }
      ]
    }
    </script>
